<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/agent.css') }}">

    <title>Agent Registeration</title>
</head>

<body>
    <div class="container mt-5">
        <div class="col-12 col-md-8 mx-auto">

            <h3 class="text-center mb-3">Agent Registration</h3>

            <!-- Approval Info -->
            <div class="alert alert-info text-center">
                Your account will require admin approval before you can log in.
            </div>

            <!-- Flash Messages (if not already in base.html) -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form id="agentSignupForm" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user"></i> Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="floatingEmail" name="email" class="form-control" required>
                </div>
                <button type="button" class="btn btn-outline-primary mb-3" id="getOtpBtn">Get OTP</button>

                <!-- OTP Section -->
                <div class="mb-3 d-none" id="otpSection">
                    <label class="form-label fw-semibold">Enter OTP</label>
                    <div class="input-group">
                        <input type="text" id="otpInput" class="form-control" placeholder="Enter 6-digit OTP"
                            maxlength="6" autocomplete="off">
                        <button type="button" class="btn btn-success" id="verifyOtpBtn">Verify OTP</button>
                    </div>
                    <small id="otpMessage" class="text-muted"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-mobile-alt"></i> Phone</label>
                    <input type="tel" class="form-control" name="phone" pattern="[6-9]{1}[0-9]{9}" maxlength="10"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <label><i class="fas fa-sitemap"></i> Department</label>
                <div class=" d-flex gap-4 mt-3 mb-3">

                    <div class="form-check ">
                        <input class="form-check-input" type="radio" name="department" value="Sales" id="sales"
                            required>
                        <label class="form-check-label" for="sales"><i class="fas fa-briefcase"></i> Sales</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="department" value="Broker" id="broker">
                        <label class="form-check-label" for="broker"><i class="fas fa-user-tie"></i> Broker</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-camera-retro"></i> Profile Photo</label>
                    <input class="form-control" type="file" name="agent_profile_img"
                        accept="image/png, image/jpeg, image/jpg">
                </div>

                <div class="d-flex gap-4 mt-3 mb-3">
                    <div class="form-check ">
                        <input class="form-check-input" type="radio" name="agent_gender" value="Male" id="male"
                            required>
                        <label class="form-check-label" for="male"><i class="fas fa-mars"></i> Male</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="agent_gender" value="Female" id="female">
                        <label class="form-check-label" for="female"><i class="fas fa-venus"></i> Female</label>
                    </div>
                </div>
                <div class="d-flex flex-column col-3 mx-auto">
                    <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
                        Register as Agent
                    </button>
                    <p class="text-center text-success mt-3">
                        Already registered?
                        <a href="{{ url_for('agent_login') }}" class="text-success">Login here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/agent.js') }}"></script>

</html>
