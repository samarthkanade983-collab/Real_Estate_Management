<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/agent.css') }}">


    <title>Agent Log-In - Real Estate</title>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
               <form method="POST" action="{{ url_for('agent_login') }}">
                    <h5>Agent Id</h5>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" name="email" placeholder="agent@example.com" required>
                        <label>agent@example.com</label>
                    </div>
                    <h5>Password</h5>
                    <div class="form-floating">
                        <input type="password" class="form-control" name="password" placeholder="Password" required>
                        <label>Password</label>
                    </div>
                    <div class="d-flex justify-content-center mt-3">
                        <button type="submit" class="btn btn-primary">Log In</button>
                    </div>
                </form>
                <div class="d-flex flex-row justify-content-center mt-3">
                    <a href="{{ url_for('agent_signup') }}" class="text-decoration-none">Don't have an account? Sign Up</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/agent.js') }}"></script>
</body>
</html>
