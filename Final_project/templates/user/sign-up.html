<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up - Real Estate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form method="POST" action="{{ url_for('sign_up') }}" enctype="multipart/form-data" id="signupForm">
                    
                    <h4 class="mb-4 text-center">Sign Up</h4>

                    <!-- Name -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" name="name" id="floatingName" placeholder="Full Name" required>
                        <label for="floatingName"><i class="fas fa-user"></i> Full Name</label>
                    </div>

                    <!-- Mobile Number -->
                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control" name="number" id="floatingMobile" placeholder="Mobile Number" required>
                        <label for="floatingMobile"><i class="fas fa-mobile-alt"></i> Mobile Number</label>
                    </div>

                    <!-- Email + Get OTP -->
                    <div class="form-floating mb-2">
                        <input type="email" class="form-control" name="email" id="floatingEmail" placeholder="Email Address" required>
                        <label for="floatingEmail"><i class="fas fa-envelope"></i> Email Address</label>
                    </div>
                    <button type="button" class="btn btn-outline-primary mb-3" id="getOtpBtn">Get OTP</button>

                    <!-- OTP Section -->
                    <div class="mb-3 d-none" id="otpSection">
                        <label class="form-label fw-semibold">Enter OTP</label>
                        <div class="input-group">
                            <input type="text" id="otpInput" class="form-control" placeholder="Enter 6-digit OTP" maxlength="6" autocomplete="off">
                            <button type="button" class="btn btn-success" id="verifyOtpBtn">Verify OTP</button>
                        </div>
                        <small id="otpMessage" class="text-muted"></small>
                    </div>

                    <!-- Password -->
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" name="password" id="floatingPassword" placeholder="Password" required>
                        <label for="floatingPassword"><i class="fas fa-lock"></i> Password</label>
                    </div>

                    <!-- Address -->
                    <div class="form-floating mb-3">
                        <textarea class="form-control" name="address" id="floatingTextarea" style="height:100px" placeholder="Address" required></textarea>
                        <label for="floatingTextarea"><i class="fas fa-home"></i> Address</label>
                    </div>

                    <!-- Profile Image -->
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-camera-retro"></i> Add Photo</label>
                        <input class="form-control" type="file" name="profile_img" accept="image/*" required>
                    </div>

                    <!-- Gender -->
                    <div class="d-flex flex-row mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" value="Male" id="male" required>
                            <label class="form-check-label" for="male"><i class="fas fa-mars"></i> Male</label>
                        </div>
                        <div class="form-check ms-3">
                            <input class="form-check-input" type="radio" name="gender" value="Female" id="female">
                            <label class="form-check-label" for="female"><i class="fas fa-venus"></i> Female</label>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-flex justify-content-center">
                        <button type="submit" class="btn btn-success" id="submitBtn" disabled>Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
